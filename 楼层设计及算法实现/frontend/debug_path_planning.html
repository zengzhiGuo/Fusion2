<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>路径规划调试页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .debug-panel {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    .test-btn {
      padding: 10px 20px;
      margin: 5px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .test-btn:hover {
      background: #40a9ff;
    }
    .result {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
    }
    .error {
      background: #ffebee;
      color: #c62828;
    }
    .success {
      background: #e8f5e9;
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>路径规划功能调试</h1>
  
  <div class="debug-panel">
    <h2>1. 检查依赖</h2>
    <button class="test-btn" onclick="checkDependencies()">检查 Vue 和 Vuedraggable</button>
    <div id="dep-result" class="result"></div>
  </div>

  <div class="debug-panel">
    <h2>2. 测试后端连接</h2>
    <button class="test-btn" onclick="testBackend()">测试后端服务器</button>
    <div id="backend-result" class="result"></div>
  </div>

  <div class="debug-panel">
    <h2>3. 测试路径规划 API</h2>
    <button class="test-btn" onclick="testPathPlanning()">测试两点路径规划</button>
    <div id="api-result" class="result"></div>
  </div>

  <div class="debug-panel">
    <h2>4. 浏览器控制台</h2>
    <p>请打开浏览器开发者工具（F12），查看 Console 标签页中的错误信息。</p>
    <p>常见错误：</p>
    <ul>
      <li>Failed to resolve import "vuedraggable" - 需要安装依赖</li>
      <li>Network Error - 后端服务器未启动</li>
      <li>CORS Error - 跨域问题</li>
      <li>Cannot read property of undefined - 组件引用问题</li>
    </ul>
  </div>

  <script>
    function checkDependencies() {
      const result = document.getElementById('dep-result');
      result.textContent = '检查中...';
      
      // 检查是否在 Vite 环境中
      if (typeof window !== 'undefined') {
        result.className = 'result success';
        result.textContent = '✓ 浏览器环境正常\n';
        result.textContent += '注意：此页面无法直接检查 Vue 和 Vuedraggable，\n';
        result.textContent += '请在前端项目中运行 npm list 查看依赖：\n\n';
        result.textContent += 'cd frontend\n';
        result.textContent += 'npm list vue\n';
        result.textContent += 'npm list vuedraggable\n';
      }
    }

    async function testBackend() {
      const result = document.getElementById('backend-result');
      result.textContent = '测试中...';
      
      try {
        const response = await fetch('http://localhost:5000/health');
        const data = await response.json();
        
        result.className = 'result success';
        result.textContent = '✓ 后端服务器连接成功\n\n';
        result.textContent += JSON.stringify(data, null, 2);
      } catch (error) {
        result.className = 'result error';
        result.textContent = '✗ 后端服务器连接失败\n\n';
        result.textContent += '错误信息：' + error.message + '\n\n';
        result.textContent += '请确认：\n';
        result.textContent += '1. Python 后端服务器已启动\n';
        result.textContent += '2. 监听在 http://localhost:5000\n';
        result.textContent += '3. 没有防火墙阻止\n\n';
        result.textContent += '启动命令：\n';
        result.textContent += 'cd path_planning\n';
        result.textContent += 'C:/Users/19534/.conda/envs/myenv/python.exe server.py';
      }
    }

    async function testPathPlanning() {
      const result = document.getElementById('api-result');
      result.textContent = '测试中...';
      
      try {
        const response = await fetch('http://localhost:5000/api/plan_path', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            start: {
              x: 22.4460,
              y: 13.4433,
              map_id: 'floor1'
            },
            end: {
              x: 21.1138,
              y: 12.9260,
              map_id: 'floor2'
            }
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          result.className = 'result success';
          result.textContent = '✓ 路径规划 API 测试成功\n\n';
          result.textContent += '总距离：' + data.total_distance.toFixed(2) + ' 米\n';
          result.textContent += '经过楼层：' + data.floors.join(' → ') + '\n';
          result.textContent += '步骤数：' + data.steps.length + '\n\n';
          result.textContent += '详细结果：\n' + JSON.stringify(data, null, 2);
        } else {
          result.className = 'result error';
          result.textContent = '✗ 路径规划失败\n\n';
          result.textContent += JSON.stringify(data, null, 2);
        }
      } catch (error) {
        result.className = 'result error';
        result.textContent = '✗ API 请求失败\n\n';
        result.textContent += '错误信息：' + error.message;
      }
    }
  </script>
</body>
</html>
